<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yakında - Glitch</title>
    <style>
        /* Genel sıfırlama ve arka plan */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0a0a;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Courier New', 'Share Tech Mono', monospace;
            overflow: hidden;
            user-select: none;
            -webkit-user-select: none;
        }

        /* Arka plan hareketli çizgiler (scanlines) */
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: repeating-linear-gradient(0deg,
                    transparent,
                    transparent 2px,
                    rgba(0, 0, 0, 0.15) 2px,
                    rgba(0, 0, 0, 0.15) 4px);
            pointer-events: none;
            z-index: 10;
        }

        /* CRT ekran kenar kararması */
        body::after {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(ellipse at center,
                    rgba(10, 10, 10, 0) 50%,
                    rgba(10, 10, 10, 0.8) 100%);
            pointer-events: none;
            z-index: 11;
        }

        .container {
            position: relative;
            z-index: 5;
            text-align: center;
            padding: 2rem;
        }

        /* Başlık stili */
        .glitch-text {
            font-size: clamp(4rem, 12vw, 9rem);
            font-weight: 900;
            letter-spacing: 0.3em;
            color: #fff;
            position: relative;
            display: inline-block;
            text-transform: uppercase;
            text-shadow:
                0 0 5px rgba(255, 255, 255, 0.6),
                0 0 15px rgba(255, 0, 255, 0.5),
                0 0 30px rgba(0, 255, 255, 0.4);
            transition: text-shadow 0.1s;
            line-height: 1.2;
        }

        /* Glitch efektinin kırmızı ve mavi kanal kopyaları */
        .glitch-text::before,
        .glitch-text::after {
            content: attr(data-text);
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0.8;
            pointer-events: none;
        }

        .glitch-text::before {
            color: #ff0040;
            z-index: -1;
            animation: glitch-anim-1 2.5s infinite linear alternate-reverse;
            text-shadow:
                2px 0 5px rgba(255, 0, 64, 0.7),
                -2px 0 5px rgba(0, 255, 255, 0.5);
        }

        .glitch-text::after {
            color: #00ffff;
            z-index: -2;
            animation: glitch-anim-2 3s infinite linear alternate-reverse;
            text-shadow:
                -2px 0 5px rgba(0, 255, 255, 0.7),
                2px 0 5px rgba(255, 0, 64, 0.5);
        }

        /* Glitch animasyonları - kayma ve kesme */
        @keyframes glitch-anim-1 {
            0% {
                transform: translate(0);
                clip-path: inset(0 0 90% 0);
            }

            20% {
                transform: translate(-4px, 2px);
                clip-path: inset(10% 0 70% 0);
            }

            40% {
                transform: translate(4px, -2px);
                clip-path: inset(30% 0 40% 0);
            }

            60% {
                transform: translate(-2px, -4px);
                clip-path: inset(60% 0 20% 0);
            }

            80% {
                transform: translate(3px, 1px);
                clip-path: inset(80% 0 5% 0);
            }

            100% {
                transform: translate(0);
                clip-path: inset(0 0 95% 0);
            }
        }

        @keyframes glitch-anim-2 {
            0% {
                transform: translate(0);
                clip-path: inset(90% 0 0 0);
            }

            25% {
                transform: translate(3px, -3px);
                clip-path: inset(5% 0 80% 0);
            }

            50% {
                transform: translate(-5px, 4px);
                clip-path: inset(50% 0 30% 0);
            }

            75% {
                transform: translate(2px, 1px);
                clip-path: inset(20% 0 60% 0);
            }

            100% {
                transform: translate(0);
                clip-path: inset(70% 0 10% 0);
            }
        }

        /* JavaScript tarafından tetiklenen yoğun glitch sınıfı */
        .glitch-text.intense-glitch {
            animation: shake 0.15s linear infinite;
            text-shadow:
                0 0 10px #fff,
                0 0 20px #ff0040,
                0 0 30px #00ffff,
                0 0 40px #ff0040;
        }

        .glitch-text.intense-glitch::before {
            animation: glitch-anim-1 0.2s infinite;
            transform: translate(-8px, 4px);
            opacity: 1;
        }

        .glitch-text.intense-glitch::after {
            animation: glitch-anim-2 0.15s infinite;
            transform: translate(8px, -4px);
            opacity: 1;
        }

        @keyframes shake {
            0%,
            100% {
                transform: translate(0);
            }
            25% {
                transform: translate(-3px, 2px);
            }
            50% {
                transform: translate(3px, -2px);
            }
            75% {
                transform: translate(-2px, -3px);
            }
        }

        /* Alt başlık */
        .subtitle {
            font-size: clamp(1rem, 3vw, 1.5rem);
            color: rgba(255, 255, 255, 0.7);
            letter-spacing: 0.2em;
            margin-top: 1.5rem;
            text-shadow: 0 0 8px rgba(0, 255, 255, 0.3);
            animation: flicker 5s infinite;
        }

        @keyframes flicker {
            0%,
            100% {
                opacity: 1;
            }
            15% {
                opacity: 0.8;
            }
            30% {
                opacity: 1;
            }
            50% {
                opacity: 0.7;
            }
            65% {
                opacity: 1;
            }
            80% {
                opacity: 0.9;
            }
            95% {
                opacity: 1;
            }
        }

        /* Rastgele yatay glitch çizgisi (arka planda) */
        .glitch-line {
            position: fixed;
            left: 0;
            width: 100%;
            height: 3px;
            background: rgba(255, 255, 255, 0.6);
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.8);
            z-index: 8;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.05s;
        }

        /* Mobil uyum */
        @media (max-width: 600px) {
            .glitch-text {
                font-size: clamp(3rem, 15vw, 5rem);
                letter-spacing: 0.2em;
            }
            .subtitle {
                font-size: 1rem;
                letter-spacing: 0.1em;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1 class="glitch-text" data-text="YAKINDA" id="glitchTitle">YAKINDA</h1>
        <p class="subtitle">YMC+ TEKRARDAN YENİ SİTESİİLE ÇOK YAKINDA YAYINDA...</p>
    </div>

    <!-- Rastgele beliren yatay glitch çizgisi -->
    <div class="glitch-line" id="glitchLine"></div>

    <script>
        (function() {
            // --- SES SİSTEMİ (Web Audio API - Glitch/Cızırtı sesleri) ---
            let audioCtx = null;

            // AudioContext'i kullanıcı etkileşimiyle başlat (tarayıcı politikası)
            function initAudio() {
                if (!audioCtx) {
                    try {
                        audioCtx = new(window.AudioContext || window.webkitAudioContext)();
                    } catch (e) {
                        console.warn('Web Audio API desteklenmiyor.');
                        return false;
                    }
                }
                if (audioCtx.state === 'suspended') {
                    audioCtx.resume();
                }
                return true;
            }

            // Kısa süreli glitch sesi oluştur (beyaz gürültü + perde kayması)
            function playGlitchSound(duration = 0.08, volume = 0.15) {
                if (!audioCtx) return;
                const sampleRate = audioCtx.sampleRate;
                const length = Math.floor(sampleRate * duration);
                const buffer = audioCtx.createBuffer(1, length, sampleRate);
                const data = buffer.getChannelData(0);

                // Beyaz gürültü doldur
                for (let i = 0; i < length; i++) {
                    data[i] = (Math.random() * 2 - 1) * 0.5;
                }

                const source = audioCtx.createBufferSource();
                source.buffer = buffer;
                // Rastgele perde kayması (0.3x - 2.5x)
                source.playbackRate.value = 0.3 + Math.random() * 2.2;

                // Biraz distorsiyon için wave shaper (opsiyonel)
                const gainNode = audioCtx.createGain();
                gainNode.gain.setValueAtTime(volume, audioCtx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration + 0.02);

                source.connect(gainNode);
                gainNode.connect(audioCtx.destination);
                source.start(audioCtx.currentTime);
                source.stop(audioCtx.currentTime + duration + 0.05);
            }

            // Çift katmanlı, daha karmaşık glitch sesi (bazen)
            function playComplexGlitch() {
                if (!audioCtx) return;
                // İlk katman: kısa patlama
                playGlitchSound(0.06 + Math.random() * 0.1, 0.2);
                // İkinci katman: hafif gecikmeli, farklı perde
                setTimeout(() => {
                    if (audioCtx) {
                        playGlitchSound(0.04 + Math.random() * 0.06, 0.12);
                    }
                }, 30 + Math.random() * 50);
            }

            // Dijital "bzzzt" tonu (kısa sinüs dalgası bozulması)
            function playDigitalBuzz() {
                if (!audioCtx) return;
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = 'square';
                // Rastgele frekans 200Hz - 2000Hz
                osc.frequency.setValueAtTime(200 + Math.random() * 1800, audioCtx.currentTime);
                osc.frequency.linearRampToValueAtTime(50 + Math.random() * 400, audioCtx.currentTime + 0.05);
                gain.gain.setValueAtTime(0.08, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.08);
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.start(audioCtx.currentTime);
                osc.stop(audioCtx.currentTime + 0.1);
            }

            // --- GÖRSEL GLITCH EFEKTLERİ ---
            const glitchTitle = document.getElementById('glitchTitle');
            const glitchLine = document.getElementById('glitchLine');

            // Yoğun glitch sınıfını kısa süreli ekle/kaldır
            function triggerIntenseGlitch() {
                if (!glitchTitle) return;
                glitchTitle.classList.add('intense-glitch');
                const duration = 80 + Math.random() * 250; // 80-330ms
                setTimeout(() => {
                    glitchTitle.classList.remove('intense-glitch');
                }, duration);
            }

            // Rastgele yatay glitch çizgisi göster
            function showGlitchLine() {
                if (!glitchLine) return;
                const topPosition = Math.random() * 100; // %0 - %100
                glitchLine.style.top = topPosition + '%';
                glitchLine.style.opacity = '0.7';
                glitchLine.style.height = (1 + Math.random() * 4) + 'px';
                // Bazen çizgi rengi değişsin
                const colors = [
                    'rgba(255,255,255,0.7)',
                    'rgba(255,0,64,0.7)',
                    'rgba(0,255,255,0.7)',
                    'rgba(255,255,0,0.6)',
                ];
                glitchLine.style.background = colors[Math.floor(Math.random() * colors.length)];
                glitchLine.style.boxShadow = `0 0 15px ${glitchLine.style.background}`;

                setTimeout(() => {
                    glitchLine.style.opacity = '0';
                }, 50 + Math.random() * 100);
            }

            // --- OLAY ZİNCİRİ: Ses + Görsel glitch'i birlikte tetikle ---
            function fireGlitchEvent() {
                // Görsel efekt
                triggerIntenseGlitch();
                showGlitchLine();

                // Ses efekti - rastgele tür seç
                const rand = Math.random();
                if (rand < 0.5) {
                    playGlitchSound(0.06 + Math.random() * 0.12, 0.18);
                } else if (rand < 0.8) {
                    playComplexGlitch();
                } else {
                    playDigitalBuzz();
                }

                // Bazen ikinci bir glitch çizgisi daha göster
                if (Math.random() < 0.4) {
                    setTimeout(showGlitchLine, 40 + Math.random() * 80);
                }
                // Bazen hemen ardından ikinci bir ses
                if (Math.random() < 0.3) {
                    setTimeout(() => playGlitchSound(0.04, 0.1), 60 + Math.random() * 100);
                }
            }

            // --- DÜZENLİ VE RASTGELE GLITCH TETİKLEME ---
            function scheduleNextGlitch() {
                // 1.5 - 6 saniye arası rastgele aralık
                const delay = 1500 + Math.random() * 4500;
                setTimeout(() => {
                    fireGlitchEvent();
                    scheduleNextGlitch(); // zinciri devam ettir
                }, delay);
            }

            // --- BAŞLANGIÇ ---
            // Sayfa yüklendiğinde kullanıcıdan etkileşim beklemeden ses başlatamayız.
            // Bu yüzden ilk tıklama/tuş ile AudioContext'i aktif edelim.
            function onUserInteraction() {
                if (initAudio()) {
                    // İlk etkileşimde hemen bir glitch patlat
                    fireGlitchEvent();
                    // Döngüyü başlat
                    scheduleNextGlitch();
                }
                // Event listener'ları kaldır
                document.removeEventListener('click', onUserInteraction);
                document.removeEventListener('keydown', onUserInteraction);
                document.removeEventListener('touchstart', onUserInteraction);
            }

            document.addEventListener('click', onUserInteraction);
            document.addEventListener('keydown', onUserInteraction);
            document.addEventListener('touchstart', onUserInteraction);

            // Görsel glitch efektleri ses olmadan da çalışabilir, onları hemen başlatalım
            // (Sadece görsel glitch döngüsü)
            function visualGlitchLoop() {
                const delay = 2000 + Math.random() * 5000;
                setTimeout(() => {
                    triggerIntenseGlitch();
                    showGlitchLine();
                    visualGlitchLoop();
                }, delay);
            }
            visualGlitchLoop();

            // Sayfa yüklendikten 1 saniye sonra bir görsel glitch patlat
            setTimeout(() => {
                triggerIntenseGlitch();
                showGlitchLine();
            }, 800);

            console.log('🔊 Sayfaya tıklayarak glitch seslerini aktif edebilirsiniz.');
            console.log('👾 YAKINDA yazısı bozuk TV efektiyle ekranda!');
        })();
    </script>
</body>
</html>
